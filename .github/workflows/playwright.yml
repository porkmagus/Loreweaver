name: Playwright Tests
permissions:
  contents: read
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Prepare environment
      run: |
        cat > .env << EOF
        POSTGRES_USER=loreweaver
        POSTGRES_PASSWORD=loreweaver
        POSTGRES_DB=loreweaver
        DATABASE_URL=postgresql://loreweaver:loreweaver@localhost:5432/loreweaver
        API_PORT=3001
        API_HOST=0.0.0.0
        NODE_ENV=development
        OPENAI_API_KEY=sk-test-key
        VITE_API_URL=http://localhost:3001
        WEB_URL=http://localhost:5173
        EOF
    - name: Start services
      run: docker compose up -d --wait
    - name: Wait for API health
      run: |
        for i in {1..60}; do
          if curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health | grep -q "200"; then
            echo "API is healthy"
            break
          fi
          echo "Waiting for API... ($i)"
          sleep 2
        done
    - name: Run Playwright tests
      env:
        CI: true
        VITE_API_URL: http://localhost:3001
        WEB_URL: http://localhost:5173
      run: npx playwright test --config apps/web/playwright.config.ts
    - name: Stop services
      if: always()
      run: docker compose down
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: |
          playwright-report/
          test-results/
        retention-days: 30
