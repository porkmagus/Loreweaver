services:
  # Relational source of truth
  postgres:
    image: postgres:16-alpine
    container_name: loreweaver_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loreweaver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loreweaver}
      POSTGRES_DB: ${POSTGRES_DB:-loreweaver}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loreweaver -d loreweaver"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Vector retrieval subsystem
  qdrant:
    image: qdrant/qdrant:latest
    container_name: loreweaver_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Fastify API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: loreweaver_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://loreweaver:loreweaver@postgres:5432/loreweaver
      QDRANT_URL: http://qdrant:6333
      API_PORT: ${API_PORT:-3001}
      API_HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: loreweaver_web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  qdrant_storage:
